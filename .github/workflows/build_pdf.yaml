name: Build a pdf from latex input files

on:
  push:
    branches:
      - master
      - 'feature/**'
  pull_request:
    branches:
      - master
      - 'feature/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
        contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Set github variables
        run: |
          echo "gitdescribe=$(git describe --tags --always --dirty --match [[:digit:]].[[:digit:]].[[:digit:]])" >> $GITHUB_ENV
          echo "gitdate=$(git show -s --format=%cs)" >> $GITHUB_ENV
      - name: Create gitinfo.tex
        run: |
          echo "\newcommand{\gitdescribe}{$gitdescribe}" > gitinfo.tex
          echo "\newcommand{\gitdate}{$gitdate}" >> gitinfo.tex
      - name: Setup Graphviz
        uses:
          ts-graphviz/setup-graphviz@v2
      - name: Setup Plantuml
        uses:
          jassielof/setup-plantuml@1
      - name: Download batik and fop files required by plantuml for pdf creation
        run: |
          mkdir -p intermediate
          curl -O --output-dir intermediate https://archive.apache.org/dist/xmlgraphics/batik/binaries/batik-bin-1.19.zip
          unzip -j intermediate/batik-bin-1.19.zip batik-1.19/lib/batik-all-1.19.jar batik-1.19/lib/fop-transcoder-allinone-2.11.jar batik-1.19/lib/xml-apis-1.4.01.jar batik-1.19/lib/xml-apis-ext-1.3.04.jar batik-1.19/lib/xmlgraphics-commons-2.11.jar -d .plantuml
      - name: Render dot files
        working-directory: ./dot
        run: |
          # make file runnable, might not be necessary
          chmod +x DotToPdf.sh
          ./DotToPdf.sh
      - name: Render puml files to pdf
        working-directory: ./puml
        run: |
          java -cp ".:../.plantuml/*" net.sourceforge.plantuml.Run -Sshadowing=false -tpdf -o "../intermediate" *.puml
      - name: Render pumlo files to png
        working-directory: ./puml
        run: |
          plantuml -tpng -o "../intermediate" *.pumlo
      - name: Run LaTeX
        uses: prafdin/latexmk-action@master
#        uses: yegor256/latexmk-action@0.18.2
        with:
          opts: -pdf nexxtender.tex
          packages: xcolor booktabs multirow mdwtools float
      - name: Rename pdf
        run: |
          mv nexxtender.pdf nexxtender-$gitdescribe.pdf
      - name: Upload pdf
        uses: actions/upload-artifact@v7
        with:
          name: Nexxtender PDF
          path: nexxtender-*.pdf
